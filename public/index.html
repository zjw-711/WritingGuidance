<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>高考作文素材库</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <!-- 移动端顶栏 -->
  <header class="mobile-header">
    <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>
    <h1 class="mobile-logo">📝 高考作文素材库</h1>
    <button class="qa-toggle-mobile" onclick="toggleRightPanel()">💡</button>
  </header>

  <!-- 遮罩层 -->
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
  <div class="right-overlay" id="rightOverlay" onclick="toggleRightPanel()"></div>

  <div class="layout">

    <!-- 左侧边栏 -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h1 class="logo">📝 高考作文素材库</h1>
      </div>

      <!-- 搜索 -->
      <div class="sidebar-search">
        <div class="search-box">
          <input type="text" id="searchInput" placeholder="搜索素材..." autocomplete="off">
          <button onclick="doSearch()">搜索</button>
        </div>
      </div>

      <!-- 分类 -->
      <div class="sidebar-section">
        <div class="sidebar-title">📂 分类</div>
        <div class="sidebar-nav" id="categoryFilter"></div>
      </div>

      <!-- 类型 -->
      <div class="sidebar-section">
        <div class="sidebar-title">📑 类型</div>
        <div class="sidebar-nav" id="typeFilter"></div>
      </div>

      <!-- 热门标签 -->
      <div class="sidebar-section">
        <div class="sidebar-title">🏷️ 热门标签</div>
        <div class="sidebar-tags" id="tagFilter"></div>
      </div>

      <!-- 统计 -->
      <div class="sidebar-footer">
        共 <strong id="totalCount">0</strong> 条素材
      </div>
    </aside>

    <!-- 主内容区 -->
    <main class="main-content">
      <section class="materials-grid" id="materialsGrid"></section>
      <div class="empty-state" id="emptyState" style="display:none;">
        <p>暂无匹配的素材</p>
      </div>
      <div class="load-more-wrapper" id="loadMoreWrapper" style="display:none;">
        <button class="btn-load-more" onclick="loadMore()">加载更多</button>
      </div>
    </main>

    <!-- 右侧命题分析面板 -->
    <aside class="right-panel" id="rightPanel">
      <div class="right-header">
        <h2>💡 命题分析与素材推荐</h2>
      </div>
      <div class="right-body" id="rightBody">
        <div class="qa-hint">选择左侧分类，查看相关命题分析和推荐素材</div>
      </div>
    </aside>
  </div>

  <!-- 素材详情弹窗 -->
  <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
    <div class="modal" onclick="event.stopPropagation()">
      <button class="modal-close" onclick="closeModalDirect()">&times;</button>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer">
        <button class="btn-copy" onclick="copyMaterial()">📋 复制全文</button>
      </div>
    </div>
  </div>

  <!-- 回到顶部 -->
  <button class="btn-top" id="btnTop" onclick="window.scrollTo({top:0,behavior:'smooth'})" title="回到顶部">↑</button>

  <footer class="footer">
    高考作文素材库 · 祝各位考生金榜题名 🎓
  </footer>

  <script src="/js/main.js"></script>
</body>
</html>
