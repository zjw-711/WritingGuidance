<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>作文素材 - 拾光阅</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <div class="noise-overlay"></div>

  <!-- 移动端顶栏 -->
  <header class="mobile-header">
    <button class="mobile-toggle" onclick="toggleSidebar()">☰</button>
    <h1 class="mobile-logo">拾光阅</h1>
    <a href="/exam" class="mobile-nav-link">📜</a>
  </header>

  <!-- 侧边栏遮罩 -->
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

  <div class="layout">

    <!-- 左侧：文艺导航 -->
    <aside class="art-sidebar" id="artSidebar">
      <div class="brand">
        <h1 class="vertical-title">高考<br>作文<br>素材</h1>
        <span class="seal">拾光</span>
      </div>

      <div class="poetic-quote">
        " 腹有诗书气自华，<br>&nbsp;&nbsp;读书万卷始通神。"
      </div>

      <div class="search-v3">
        <input type="text" id="searchInput" placeholder="寻觅佳句 / 典故..." autocomplete="off">
        <div class="search-line"></div>
      </div>

      <nav class="filter-nav" id="categoryFilter">
        <!-- 动态分类 + 子分类 -->
      </nav>

      <div class="tag-filter" id="tagFilter">
        <!-- 动态标签 -->
      </div>

      <div class="sidebar-footer-v3">
        共收录佳作 <span id="totalCount" class="highlight-num">0</span> 篇
      </div>
    </aside>

    <!-- 右侧：阅读区 -->
    <main class="art-main">
      <div class="page-header">
        <div class="type-bar" id="typeFilter"></div>
        <a href="/exam" class="link-exam">阅览历年真题 ➔</a>
      </div>

      <div class="magazine-grid" id="materialsGrid"></div>

      <div class="empty-state-v3" id="emptyState" style="display:none;">
        未寻得相关笔墨，换个词试试罢。
      </div>

      <div class="load-more-v3" id="loadMoreWrapper" style="display:none;">
        <button class="btn-text" onclick="loadMore()">展卷更多</button>
      </div>
    </main>

  </div>

  <!-- 阅读浮窗 (仿书本打开) -->
  <div class="reader-overlay" id="readerOverlay" onclick="closeReader()"></div>
  <div class="reader-modal" id="readerModal">
    <div class="reader-paper">
      <button class="reader-close" onclick="closeReader()">×</button>
      <div class="reader-content" id="readerContent"></div>
      <div class="reader-actions">
        <button class="btn-seal" onclick="copyMaterial()">临摹此卷 (复制)</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast-v3"></div>

  <script src="/js/main.js"></script>
</body>
</html>
